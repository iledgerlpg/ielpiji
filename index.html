<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1d4ed8"/>
  <meta name="description" content="ILPG — Sistem Informasi Logistik Pangkalan Gas"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>ILPG — Informasi Logistik Pangkalan Gas</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/png" href="/assets/icon-192.png"/>
  <link rel="apple-touch-icon" href="/assets/icon-192.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',950:'#172554' },
          },
          animation: { 'spin-slow':'spin 3s linear infinite', 'fade-in':'fadeIn .3s ease', 'scale-in':'scaleIn .2s ease' },
          keyframes: { fadeIn:{'0%':{opacity:'0'},'100%':{opacity:'1'}}, scaleIn:{'0%':{transform:'scale(.95)',opacity:'0'},'100%':{transform:'scale(1)',opacity:'1'}} },
        }
      }
    };
  </script>
  <style>
    :root { --brand: #1d4ed8; }
    * { box-sizing: border-box; }
    body { background: #0f1623; }
    .loader { width: 48px; height: 48px; border: 4px solid #1e3a8a; border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo-glow { filter: drop-shadow(0 0 24px rgba(59,130,246,.5)); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <!-- Splash screen saat redirect -->
  <div class="text-center space-y-6 animate-fade-in">
    <!-- Logo -->
    <div class="logo-glow">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="72" height="72" rx="18" fill="#1d4ed8"/>
        <path d="M36 14C24.954 14 16 22.954 16 34c0 8.284 5.03 15.427 12.288 18.52L36 58l7.712-5.48C51.97 49.427 57 42.284 57 34c0-11.046-8.954-20-21-20z" fill="#60a5fa" opacity=".3"/>
        <path d="M36 20c-7.732 0-14 6.268-14 14 0 5.58 3.248 10.406 7.974 12.74L36 50l6.026-3.26C46.752 44.406 50 39.58 50 34c0-7.732-6.268-14-14-14z" fill="#93c5fd" opacity=".5"/>
        <circle cx="36" cy="34" r="7" fill="#fff"/>
        <path d="M36 29v10M31 34h10" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h1 class="text-2xl font-bold text-white tracking-tight">ILPG</h1>
      <p class="text-blue-400 text-sm mt-1">Informasi Logistik Pangkalan Gas</p>
    </div>
    <div class="flex justify-center">
      <div class="loader"></div>
    </div>
    <p class="text-slate-500 text-xs" id="status-text">Memeriksa sesi...</p>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Redirect berdasarkan status sesi
    (function bootstrap() {
      document.getElementById('status-text').textContent = 'Memeriksa sesi...';

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Register failed:', err));
      }

      setTimeout(() => {
        if (Auth.isLoggedIn()) {
          const role = Auth.getRole();
          const url  = Auth.getDashboardUrl(role);
          document.getElementById('status-text').textContent = 'Membuka dashboard...';
          window.location.replace(url);
        } else {
          document.getElementById('status-text').textContent = 'Menuju halaman login...';
          window.location.replace('/pages/login');
        }
      }, 800);
    })();
  </script>
</body>
</html>
