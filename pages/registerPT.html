<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1d4ed8"/>
  <title>ILPG — Daftar PT</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/assets/icon-192.png"/>
  <link rel="stylesheet" href="/css/tailwind.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    .form-input { width:100%; padding:.75rem 1rem; border-radius:.75rem; border:1px solid #cbd5e1; background:#fff; color:#0f172a; font-size:.875rem; outline:none; transition:border .15s, box-shadow .15s; }
    .form-input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .dark .form-input { background:#1e293b; border-color:#334155; color:#f1f5f9; }
    .form-input::placeholder { color:#94a3b8; }
    .btn-primary { width:100%; display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.75rem 1.5rem; background:#2563eb; color:#fff; font-size:.875rem; font-weight:600; border-radius:.75rem; border:none; cursor:pointer; transition:background .15s; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    /* Form Card Styles */
    .form-card { background:#fff; border-radius:1rem; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); padding:2rem; width:100%; max-width:400px; }
    .dark .form-card { background:#0f172a; border:1px solid #1e293b; box-shadow:none; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-950 flex items-center justify-center p-4 md:p-8 overflow-y-auto">

  <div class="form-card animate-slide-up mt-8 mb-8">

    <div class="flex flex-col items-center mb-10 gap-4">
      <img src="/assets/icon-128.png" alt="ILPG Logo" class="w-24 h-24 rounded-3xl" />
      <div class="text-center">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">ILPG</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400">Pendaftaran Perusahaan Baru</p>
      </div>
    </div>

    <div class="space-y-5">
      <div>
        <h2 class="text-xl font-bold text-slate-900 dark:text-white">Daftarkan Perusahaan</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Satu kali pendaftaran. HRD pertama akan otomatis dibuat.</p>
      </div>

      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Nama PT <span class="text-red-400">*</span></label>
            <input id="r-nama-pt" type="text" class="form-input" placeholder="PT Maju Jaya"/>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Kode Unik <span class="text-red-400">*</span></label>
            <input id="r-kode" type="text" class="form-input font-mono uppercase" placeholder="ILPG-001" oninput="this.value=this.value.toUpperCase()"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Email PT <span class="text-red-400">*</span></label>
          <input id="r-email-pt" type="email" class="form-input" placeholder="info@pt.com"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Alamat PT <span class="text-red-400">*</span></label>
          <input id="r-alamat" type="text" class="form-input" placeholder="Jl. Merpati No.42, Jakarta"/>
        </div>
        <div class="border-t border-slate-200 dark:border-slate-800 pt-3">
          <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-2">Data HRD Pertama</p>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Nama HRD <span class="text-red-400">*</span></label>
              <input id="r-hrd-nama" type="text" class="form-input" placeholder="Budi Santoso"/>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">No. HP HRD</label>
              <input id="r-hrd-hp" type="tel" class="form-input" placeholder="081234567890"/>
            </div>
          </div>
          <div class="mt-2">
            <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Email HRD <span class="text-red-400">*</span></label>
            <input id="r-hrd-email" type="email" class="form-input" placeholder="hrd@pt.com"/>
          </div>
          <div class="mt-2 relative">
            <label class="block text-xs font-medium text-slate-700 dark:text-slate-300 mb-1">Sandi HRD <span class="text-red-400">*</span> <span class="text-slate-400 font-normal">(min. 8 karakter)</span></label>
            <input id="r-hrd-pass" type="password" class="form-input pr-12" placeholder="Minimal 8 karakter"/>
            <button type="button" class="absolute right-3 bottom-3 text-slate-400 hover:text-slate-600 p-0.5" onclick="togglePwd('r-hrd-pass',this)" tabindex="-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div id="register-error" class="hidden bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-800 rounded-xl px-4 py-3 text-sm text-red-600 dark:text-red-400"></div>
      <div id="register-success" class="hidden bg-green-50 dark:bg-green-950/40 border border-green-200 dark:border-green-800 rounded-xl px-4 py-3 text-sm text-green-700 dark:text-green-400"></div>

      <button id="register-btn" class="btn-primary" onclick="doRegister()">
        Daftarkan Perusahaan
      </button>

      <p class="text-center text-xs text-slate-400 dark:text-slate-500 mt-6">
        Sudah mendaftarkan PT?
        <a class="text-blue-500 hover:underline font-medium" href="/login.html">Kembali ke Halaman Login.</a>
      </p>
    </div>

    <div class="mt-8 flex items-center justify-between text-xs text-slate-400 dark:text-slate-600 border-t border-slate-100 dark:border-slate-900 pt-4">
      <span>ILPG v1.0</span>
      <button onclick="toggleTheme()" class="flex items-center gap-1 hover:text-slate-600 dark:hover:text-slate-400 transition-colors">
        <span id="theme-toggle-icon">🌙</span> Ganti tema
      </button>
    </div>

  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/ui.js"></script>

  <script>
    // ── Theme ──
    function toggleTheme() {
      const d = document.documentElement.classList.toggle('dark');
      localStorage.setItem('ilpg_theme', d ? 'dark' : 'light');
      document.getElementById('theme-toggle-icon').textContent = d ? '☀️' : '🌙';
    }
    (function initTheme() {
      const saved = localStorage.getItem('ilpg_theme');
      const isDark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('theme-toggle-icon').textContent = isDark ? '☀️' : '🌙';
    })();

    // ── Guard (redirect if logged in) ──
    Auth.guardLogin();

    // ── Helpers ──
    function togglePwd(inputId, btn) {
      const inp = document.getElementById(inputId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function showError(id, msg)  { const el = document.getElementById(id); el.textContent = msg; el.classList.remove('hidden'); }
    function hideError(id)       { document.getElementById(id).classList.add('hidden'); }
    function showSuccess(id, msg){ const el = document.getElementById(id); el.textContent = msg; el.classList.remove('hidden'); }

    // ── REGISTER PT ──
    async function doRegister() {
      hideError('register-error');
      document.getElementById('register-success').classList.add('hidden');

      const body = {
        nama_pt:      document.getElementById('r-nama-pt').value.trim(),
        kode_unik:    document.getElementById('r-kode').value.trim().toUpperCase(),
        email_pt:     document.getElementById('r-email-pt').value.trim(),
        alamat:       document.getElementById('r-alamat').value.trim(),
        hrd_nama:     document.getElementById('r-hrd-nama').value.trim(),
        hrd_email:    document.getElementById('r-hrd-email').value.trim(),
        hrd_password: document.getElementById('r-hrd-pass').value,
        hrd_no_hp:    document.getElementById('r-hrd-hp').value.trim(),
      };

      const missing = ['nama_pt','kode_unik','email_pt','alamat','hrd_nama','hrd_email','hrd_password'].filter(k => !body[k]);
      if (missing.length) { showError('register-error', 'Semua field bertanda * wajib diisi.'); return; }
      if (body.hrd_password.length < 8) { showError('register-error', 'Sandi HRD minimal 8 karakter.'); return; }

      const btn = document.getElementById('register-btn');
      UI.setLoading(btn, true, 'Mendaftarkan...');

      // Fungsi registerPT dari Auth.js akan mengecek apakah lo Super Admin
      const res = await Auth.registerPT(body);
      UI.setLoading(btn, false);

      if (res.success) {
        showSuccess('register-success', `✅ PT "${body.nama_pt}" berhasil didaftarkan! Kode PT: ${res.data.kode_unik}. Silakan login.`);
        // Setelah sukses, arahkan ke halaman login
        setTimeout(() => window.location.href = '/login.html', 2500);
      } else {
        showError('register-error', res.message || 'Pendaftaran gagal.');
      }
    }

    // Enter key submit
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      doRegister();
    });
  </script>
</body>
</html>
