<!DOCTYPE html>
<!--
  ILPG — _layout.html
  Ini adalah TEMPLATE referensi sidebar & topbar yang digunakan di semua halaman.
  Setiap halaman dashboard me-include struktur ini secara copy-paste
  (Cloudflare Pages = static files, tidak ada server-side includes).
  
  Komponen yang ada:
  - <head> global: Tailwind, meta, styles
  - Sidebar navigation (collapsible, mobile-responsive)
  - Topbar (user info, theme toggle, notifikasi offline)
  - Main content slot (#main-content)
  - Global modals (camera)
  - Script bootloader
-->
<html lang="id" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1d4ed8"/>
  <title>ILPG</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/assets/icon-192.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',950:'#172554' }
          },
          animation: { 'fade-in':'fadeIn .25s ease','scale-in':'scaleIn .2s ease','slide-in':'slideIn .25s ease' },
          keyframes: {
            fadeIn:   {'0%':{opacity:0},'100%':{opacity:1}},
            scaleIn:  {'0%':{transform:'scale(.95)',opacity:0},'100%':{transform:'scale(1)',opacity:1}},
            slideIn:  {'0%':{transform:'translateX(-100%)'},'100%':{transform:'translateX(0)'}},
          },
        }
      }
    };
  </script>
  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { @apply bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    /* ── Layout ── */
    .sidebar  { width: 260px; transition: transform .25s ease, width .25s ease; }
    .sidebar.collapsed { width: 72px; }
    .sidebar.collapsed .nav-label,
    .sidebar.collapsed .nav-section-label,
    .sidebar.collapsed .user-info { display: none; }
    .sidebar.collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
    .main-content { transition: margin-left .25s ease; }

    /* ── Cards ── */
    .card { @apply bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-5; }
    .card-compact { @apply bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-4; }

    /* ── Buttons ── */
    .btn-primary   { @apply inline-flex items-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-medium rounded-xl transition-all duration-150 disabled:opacity-50 disabled:cursor-not-allowed; }
    .btn-secondary { @apply inline-flex items-center gap-2 px-4 py-2.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 text-sm font-medium rounded-xl transition-all duration-150; }
    .btn-danger    { @apply inline-flex items-center gap-2 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-xl transition-all; }
    .btn-success   { @apply inline-flex items-center gap-2 px-4 py-2.5 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-xl transition-all; }
    .btn-icon      { @apply p-2 rounded-xl transition-colors hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400; }

    /* ── Form ── */
    .form-label { @apply block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5; }
    .form-input { @apply w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all; }
    .form-select { @apply w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all; }
    .form-textarea { @apply w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-y; }
    .form-error { @apply text-xs text-red-500 mt-1; }

    /* ── Badges ── */
    .badge         { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium; }
    .badge-green   { @apply bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400; }
    .badge-red     { @apply bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400; }
    .badge-yellow  { @apply bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400; }
    .badge-blue    { @apply bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-400; }
    .badge-gray    { @apply bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400; }
    .badge-purple  { @apply bg-purple-100 dark:bg-purple-900/40 text-purple-700 dark:text-purple-400; }
    .badge-indigo  { @apply bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-400; }
    .badge-teal    { @apply bg-teal-100 dark:bg-teal-900/40 text-teal-700 dark:text-teal-400; }

    /* ── Table ── */
    .table-wrapper { @apply overflow-x-auto rounded-2xl border border-slate-200 dark:border-slate-800; }
    table { @apply w-full text-sm text-left; }
    thead th { @apply px-4 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider bg-slate-50 dark:bg-slate-900/50; }
    tbody tr { @apply border-t border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors; }
    tbody td { @apply px-4 py-3 text-slate-700 dark:text-slate-300; }

    /* ── Stat Cards ── */
    .stat-card { @apply card flex items-start gap-4; }
    .stat-icon { @apply w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 text-xl; }
    .stat-label { @apply text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wide; }
    .stat-value { @apply text-2xl font-bold text-slate-900 dark:text-white mt-0.5; }
    .stat-sub   { @apply text-xs text-slate-500 dark:text-slate-400 mt-1; }

    /* ── Nav items ── */
    .nav-item { @apply flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-blue-50 dark:hover:bg-blue-950/50 hover:text-blue-600 dark:hover:text-blue-400 transition-all cursor-pointer; }
    .nav-item.active { @apply bg-blue-50 dark:bg-blue-950/60 text-blue-700 dark:text-blue-400 font-semibold; }
    .nav-item svg { @apply w-5 h-5 shrink-0; }
    .nav-section-label { @apply text-xs text-slate-400 dark:text-slate-600 font-semibold uppercase tracking-widest px-3 pt-4 pb-1; }

    /* ── Empty state ── */
    .empty-state { @apply flex flex-col items-center justify-center py-16 text-center; }

    /* ── Page header ── */
    .page-header { @apply mb-6 flex flex-col gap-1; }
    .page-title  { @apply text-xl font-bold text-slate-900 dark:text-white; }
    .page-sub    { @apply text-sm text-slate-500 dark:text-slate-400; }

    /* ── Filter bar ── */
    .filter-bar { @apply flex flex-wrap gap-3 items-center mb-5; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }

    /* ── Camera modal ── */
    #camera-modal video  { transform: scaleX(-1); border-radius: 12px; width: 100%; }
    #camera-modal canvas { display: none; }

    /* ── Animation ── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .animate-pulse { animation: pulse 1.8s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 min-h-screen">

<!-- ============================================================
     SIDEBAR
     ============================================================ -->
<aside id="sidebar" class="sidebar fixed inset-y-0 left-0 z-40 flex flex-col bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 shadow-lg md:shadow-none md:translate-x-0 -translate-x-full" aria-label="Sidebar">
  <!-- Logo -->
  <div class="flex items-center gap-3 px-4 h-16 border-b border-slate-200 dark:border-slate-800 shrink-0">
    <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center shrink-0">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" fill="#fff"/><path d="M10 4v12M4 10h12" stroke="#1d4ed8" stroke-width="2" stroke-linecap="round" opacity=".4"/></svg>
    </div>
    <div class="nav-label">
      <div class="font-bold text-slate-900 dark:text-white text-sm leading-tight">ILPG</div>
      <div class="text-xs text-slate-400 dark:text-slate-500">Logistik Gas</div>
    </div>
  </div>

  <!-- Navigation (diisi oleh masing-masing halaman via JS) -->
  <nav class="flex-1 overflow-y-auto py-3 px-3 space-y-0.5" id="sidebar-nav">
    <!-- Diisi dinamis oleh masing-masing dashboard JS -->
  </nav>

  <!-- User info bawah sidebar -->
  <div class="border-t border-slate-200 dark:border-slate-800 p-3 shrink-0">
    <div class="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors cursor-pointer" onclick="UI.openModal('profile-modal')">
      <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold shrink-0" data-user-avatar>?</div>
      <div class="user-info min-w-0 flex-1">
        <div class="text-sm font-medium text-slate-900 dark:text-white truncate" data-user-nama>—</div>
        <div class="text-xs text-slate-500 dark:text-slate-400 truncate" data-user-role>—</div>
      </div>
      <button data-toggle-theme class="btn-icon text-xs" data-theme-icon title="Ganti tema">🌙</button>
    </div>
  </div>
</aside>

<!-- Mobile sidebar overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

<!-- ============================================================
     TOPBAR
     ============================================================ -->
<header class="fixed top-0 right-0 left-0 md:left-[260px] h-16 z-30 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center px-4 gap-3">
  <!-- Hamburger (mobile) -->
  <button class="btn-icon md:hidden" onclick="toggleSidebar()" aria-label="Toggle sidebar">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>

  <!-- Page title (diisi via JS) -->
  <div class="flex-1 min-w-0">
    <h1 class="text-base font-semibold text-slate-900 dark:text-white truncate" id="topbar-title">Dashboard</h1>
  </div>

  <!-- Offline queue badge -->
  <button class="btn-icon relative" onclick="showQueueModal()" title="Antrian offline" id="queue-btn">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
    <span data-queue-badge class="hidden absolute -top-1 -right-1 w-4 h-4 rounded-full bg-amber-500 text-white text-[10px] flex items-center justify-center font-bold">0</span>
  </button>

  <!-- Theme toggle -->
  <button data-toggle-theme class="btn-icon" data-theme-icon title="Ganti tema">🌙</button>

  <!-- Avatar dropdown -->
  <div class="relative" id="avatar-menu">
    <button class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold hover:ring-2 hover:ring-blue-400 transition-all" data-user-avatar onclick="toggleAvatarMenu()">?</button>
    <div id="avatar-dropdown" class="hidden absolute right-0 top-12 w-52 bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 py-2 z-50 animate-scale-in">
      <div class="px-4 py-2 border-b border-slate-100 dark:border-slate-800">
        <div class="text-sm font-semibold text-slate-900 dark:text-white truncate" data-user-nama>—</div>
        <div class="text-xs text-slate-500 dark:text-slate-400 truncate" data-user-email>—</div>
      </div>
      <button class="w-full text-left px-4 py-2.5 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 flex items-center gap-2 transition-colors" onclick="UI.openModal('profile-modal');toggleAvatarMenu()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Profil
      </button>
      <button class="w-full text-left px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 dark:hover:bg-red-950/30 flex items-center gap-2 transition-colors" data-logout>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Keluar
      </button>
    </div>
  </div>
</header>

<!-- ============================================================
     MAIN CONTENT AREA
     ============================================================ -->
<main class="pt-16 md:ml-[260px] min-h-screen transition-all duration-300" id="main-wrapper">
  <div class="p-4 md:p-6 max-w-7xl mx-auto" id="main-content">
    <!-- Konten halaman dimuat di sini -->
  </div>
</main>

<!-- ============================================================
     CAMERA MODAL (global, dipakai di banyak halaman)
     ============================================================ -->
<div id="camera-modal" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4" data-modal-backdrop>
  <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200 dark:border-slate-800">
      <h3 class="font-semibold text-slate-900 dark:text-white" id="camera-modal-title">Ambil Foto</h3>
      <button class="btn-icon" onclick="Camera.stop();UI.closeModal('camera-modal')" aria-label="Tutup">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-4 space-y-3">
      <div class="relative bg-slate-900 rounded-xl overflow-hidden aspect-[4/3] flex items-center justify-center">
        <video id="camera-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
        <!-- Overlay grid untuk selfie guidance -->
        <div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(rgba(0,0,0,0) 0%, rgba(0,0,0,0.15) 100%);"></div>
        <div class="absolute inset-4 border-2 border-white/20 rounded-xl pointer-events-none"></div>
      </div>
      <canvas id="camera-canvas" class="hidden"></canvas>
      <div class="text-xs text-slate-500 dark:text-slate-400 text-center">📸 Pastikan wajah Anda terlihat jelas</div>
      <!-- Preview foto -->
      <div id="camera-preview" class="hidden">
        <img id="camera-preview-img" class="w-full rounded-xl aspect-[4/3] object-cover" src="" alt="Preview">
        <div class="flex gap-2 mt-2">
          <button class="btn-secondary flex-1 text-sm" onclick="retakePhoto()">Ulangi</button>
          <button class="btn-primary flex-1 text-sm" id="camera-use-btn">Gunakan Foto</button>
        </div>
      </div>
      <!-- Capture button -->
      <div id="camera-capture-area">
        <button id="camera-capture-btn" class="btn-primary w-full justify-center text-sm gap-2 py-3">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.94 11a9 9 0 11-9.94-9.94"/></svg>
          Ambil Foto
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ============================================================
     PROFILE MODAL
     ============================================================ -->
<div id="profile-modal" class="fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm hidden items-center justify-center p-4" data-modal-backdrop>
  <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md">
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-200 dark:border-slate-800">
      <h3 class="font-semibold text-slate-900 dark:text-white">Profil Saya</h3>
      <button class="btn-icon" data-close-modal="profile-modal">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-5 space-y-4">
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-white text-2xl font-bold" data-user-avatar>?</div>
        <div>
          <div class="font-semibold text-slate-900 dark:text-white text-lg" data-user-nama>—</div>
          <div class="text-sm text-slate-500 dark:text-slate-400" data-user-email>—</div>
          <div class="mt-1" id="profile-role-badge"></div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="card-compact">
          <div class="text-xs text-slate-500 dark:text-slate-400">Perusahaan</div>
          <div class="font-medium text-slate-900 dark:text-white mt-0.5" data-user-pt>—</div>
        </div>
        <div class="card-compact">
          <div class="text-xs text-slate-500 dark:text-slate-400">Kode PT</div>
          <div class="font-medium text-slate-900 dark:text-white mt-0.5 font-mono" id="profile-kode-unik">—</div>
        </div>
      </div>
      <button class="btn-danger w-full justify-center" data-logout>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg>
        Keluar dari Akun
      </button>
    </div>
  </div>
</div>

<!-- ============================================================
     GLOBAL SCRIPTS BOOTLOADER
     ============================================================ -->
<script>
  window.ILPG_CONFIG = { API_URL: 'https://script.google.com/macros/s/GANTI_DEPLOYMENT_ID/exec' };
</script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/db.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/camera.js"></script>

<script>
  // ── Sidebar toggle ──
  function toggleSidebar(force) {
    const sb      = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const isOpen  = !sb.classList.contains('-translate-x-full');
    const open    = force !== undefined ? force : !isOpen;
    sb.classList.toggle('-translate-x-full', !open);
    overlay.classList.toggle('hidden', !open);
  }

  // ── Avatar dropdown ──
  function toggleAvatarMenu() {
    document.getElementById('avatar-dropdown').classList.toggle('hidden');
  }
  document.addEventListener('click', (e) => {
    if (!document.getElementById('avatar-menu')?.contains(e.target)) {
      document.getElementById('avatar-dropdown')?.classList.add('hidden');
    }
  });

  // ── Retake photo ──
  function retakePhoto() {
    document.getElementById('camera-preview').classList.add('hidden');
    document.getElementById('camera-capture-area').classList.remove('hidden');
  }

  // ── Show queue modal ──
  async function showQueueModal() {
    const items = await DB.getQueue();
    if (items.length === 0) { UI.toast('Tidak ada data offline yang tertunda.', 'info'); return; }
    const countPending = items.filter(i => i.status === 'PENDING').length;
    const ok = await UI.confirm(`Terdapat ${countPending} data yang belum terkirim. Kirim sekarang?`, 'Antrian Offline');
    if (ok) {
      const result = await DB.flushQueue();
      UI.toast(`${result.flushed} data berhasil dikirim${result.failed > 0 ? `, ${result.failed} gagal` : ''}.`, result.failed > 0 ? 'warning' : 'success');
      UI.updateQueueBadge();
    }
  }

  // ── Profile modal data ──
  function populateProfileModal() {
    const s = Auth.getSession();
    if (!s) return;
    const el = document.getElementById('profile-role-badge');
    if (el) el.innerHTML = UI.badge(s.role.replace('_',' '), s.role);
    const kEl = document.getElementById('profile-kode-unik');
    if (kEl) kEl.textContent = s.kode_unik || '—';
  }

  // ── Init ──
  document.addEventListener('DOMContentLoaded', () => {
    UI.init();
    populateProfileModal();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
  });
</script>
</body>
</html>
