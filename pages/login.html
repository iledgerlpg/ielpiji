<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#1d4ed8"/>
  <title>ILPG — Login</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/assets/icon-192.png"/>
  <link rel="stylesheet" href="/css/tailwind.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    .form-input { width:100%; padding:.75rem 1rem; border-radius:.75rem; border:1px solid #cbd5e1; background:#fff; color:#0f172a; font-size:.875rem; outline:none; transition:border .15s, box-shadow .15s; }
    .form-input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.15); }
    .dark .form-input { background:#1e293b; border-color:#334155; color:#f1f5f9; }
    .form-input::placeholder { color:#94a3b8; }
    .btn-primary { width:100%; display:flex; align-items:center; justify-content:center; gap:.5rem; padding:.75rem 1.5rem; background:#2563eb; color:#fff; font-size:.875rem; font-weight:600; border-radius:.75rem; border:none; cursor:pointer; transition:background .15s; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    .tab-btn { flex:1; padding:.625rem 0; font-size:.875rem; font-weight:500; border-radius:.5rem; border:none; background:transparent; cursor:pointer; transition:all .2s; color:#64748b; }
    .dark .tab-btn { color:#94a3b8; }
    .tab-btn.active { background:#fff; color:#2563eb; box-shadow:0 1px 2px rgba(0,0,0,.06); }
    .dark .tab-btn.active { background:#1e293b; color:#60a5fa; }
    .tab-btn:not(.active):hover { color:#334155; }
    .dark .tab-btn:not(.active):hover { color:#cbd5e1; }
    .step { display: none; }
    .step.active { display: block; }
    /* Form Card Styles */
    .form-card { background:#fff; border-radius:1rem; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); padding:2rem; width:100%; max-width:400px; }
    .dark .form-card { background:#0f172a; border:1px solid #1e293b; box-shadow:none; }
  </style>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-950 flex items-center justify-center p-4 md:p-8">

  <div class="form-card animate-slide-up">

    <div class="flex flex-col items-center mb-10 gap-4">
      <img src="/assets/icon-128.png" alt="ILPG Logo" class="w-24 h-24 rounded-3xl" />
      <div class="text-center">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">ILPG</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400">Informasi Logistik Pangkalan Gas</p>
      </div>
    </div>

    <div class="flex bg-slate-100 dark:bg-slate-900 rounded-xl p-1 mb-6" id="tab-bar">
      <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" data-tab="reset" onclick="switchTab('reset')">Reset Sandi</button>
    </div>

    <div id="tab-login" class="step active space-y-5">
      <div>
        <h2 class="text-xl font-bold text-slate-900 dark:text-white">Selamat datang</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Masuk menggunakan Sold to, email, dan sandi Anda.</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Kode Perusahaan</label>
          <input id="l-kode" type="text" class="form-input font-mono uppercase" placeholder="112233" autocomplete="organization" oninput="this.value=this.value.toUpperCase()"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Email</label>
          <input id="l-email" type="email" class="form-input" placeholder="nama@perusahaan.com" autocomplete="email"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Sandi</label>
          <div class="relative">
            <input id="l-password" type="password" class="form-input pr-12" placeholder="Sandi Anda" autocomplete="current-password"/>
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 p-1 transition-colors" onclick="togglePwd('l-password', this)" tabindex="-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div id="login-error" class="hidden bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-800 rounded-xl px-4 py-3 text-sm text-red-600 dark:text-red-400"></div>

      <button id="login-btn" class="btn-primary" onclick="doLogin()">
        Masuk
      </button>

      <p class="text-center text-xs text-slate-400 dark:text-slate-500">
      </p>
    </div>

    <div id="tab-reset" class="step space-y-5">
      <div>
        <h2 class="text-xl font-bold text-slate-900 dark:text-white">Reset Sandi</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Kami akan kirim kode OTP ke email Anda.</p>
      </div>

      <div id="reset-step-1" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Kode Perusahaan</label>
          <input id="rs-kode" type="text" class="form-input font-mono uppercase" placeholder="ILPG-001" oninput="this.value=this.value.toUpperCase()"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Email Terdaftar</label>
          <input id="rs-email" type="email" class="form-input" placeholder="email@perusahaan.com"/>
        </div>
        <div id="reset-error-1" class="hidden bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-800 rounded-xl px-4 py-3 text-sm text-red-600 dark:text-red-400"></div>
        <button id="otp-btn" class="btn-primary" onclick="doRequestOTP()">
          Kirim Kode OTP ke Email
        </button>
      </div>

      <div id="reset-step-2" class="hidden space-y-4">
        <div class="bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-800 rounded-xl px-4 py-3 text-sm text-blue-700 dark:text-blue-300">
          ✅ Kode OTP telah dikirim ke email Anda. Berlaku 15 menit.
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Kode OTP (6 digit)</label>
          <input id="rs-otp" type="number" class="form-input text-center text-2xl font-mono tracking-widest" placeholder="000000" maxlength="6"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Sandi Baru</label>
          <input id="rs-newpass" type="password" class="form-input" placeholder="Minimal 8 karakter"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Konfirmasi Sandi Baru</label>
          <input id="rs-confirm" type="password" class="form-input" placeholder="Ulangi sandi baru"/>
        </div>
        <div id="reset-error-2" class="hidden bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-800 rounded-xl px-4 py-3 text-sm text-red-600 dark:text-red-400"></div>
        <button id="confirm-btn" class="btn-primary" onclick="doConfirmReset()">
          Simpan Sandi Baru
        </button>
        <button class="w-full text-sm text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" onclick="document.getElementById('reset-step-1').classList.remove('hidden');document.getElementById('reset-step-2').classList.add('hidden')">
          ← Kembali
        </button>
      </div>
    </div>

    <div class="mt-8 flex items-center justify-between text-xs text-slate-400 dark:text-slate-600">
      <span>ILPG v1.0</span>
      <button onclick="toggleTheme()" class="flex items-center gap-1 hover:text-slate-600 dark:hover:text-slate-400 transition-colors">
        <span id="theme-toggle-icon">🌙</span> Ganti tema
      </button>
    </div>

  </div>

  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/ui.js"></script>

  <script>
    // ── Theme ──
    function toggleTheme() {
      const d = document.documentElement.classList.toggle('dark');
      localStorage.setItem('ilpg_theme', d ? 'dark' : 'light');
      document.getElementById('theme-toggle-icon').textContent = d ? '☀️' : '🌙';
    }
    (function initTheme() {
      const saved = localStorage.getItem('ilpg_theme');
      const isDark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('theme-toggle-icon').textContent = isDark ? '☀️' : '🌙';
    })();

    // ── Guard (redirect if logged in) ──
    Auth.guardLogin();

    // ── Tab switcher ──
    function switchTab(tab) {
      ['login','reset'].forEach(t => {
        const tabEl = document.getElementById('tab-' + t);
        const tabBtnEl = document.querySelector(`[data-tab="${t}"]`);
        if(tabEl) tabEl.classList.toggle('active', t === tab);
        if(tabEl) tabEl.classList.toggle('step', true);
        if(tabBtnEl) tabBtnEl.classList.toggle('active', t === tab);
      });
    }

    // ── Helpers ──
    function togglePwd(inputId, btn) {
      const inp = document.getElementById(inputId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function showError(id, msg)  { const el = document.getElementById(id); el.textContent = msg; el.classList.remove('hidden'); }
    function hideError(id)       { document.getElementById(id).classList.add('hidden'); }
    function showSuccess(id, msg){ const el = document.getElementById(id); el.textContent = msg; el.classList.remove('hidden'); }

    // ── LOGIN ──
    async function doLogin() {
      hideError('login-error');
      const kode  = document.getElementById('l-kode').value.trim();
      const email = document.getElementById('l-email').value.trim();
      const pass  = document.getElementById('l-password').value;

      if (!kode || !email || !pass) { showError('login-error', 'Semua field wajib diisi.'); return; }

      const btn = document.getElementById('login-btn');
      UI.setLoading(btn, true, 'Memverifikasi...');

      const result = await Auth.login(kode, email, pass);

      UI.setLoading(btn, false);

      if (result.success) {
        btn.textContent = '✅ Berhasil! Mengarahkan...';
        setTimeout(() => window.location.replace(result.redirectUrl), 600);
      } else {
        showError('login-error', result.message || 'Login gagal. Periksa kembali data Anda.');
      }
    }

    // ── REQUEST OTP ──
    async function doRequestOTP() {
      hideError('reset-error-1');
      const kode  = document.getElementById('rs-kode').value.trim();
      const email = document.getElementById('rs-email').value.trim();
      if (!kode || !email) { showError('reset-error-1', 'Kode PT dan email wajib diisi.'); return; }

      const btn = document.getElementById('otp-btn');
      UI.setLoading(btn, true, 'Mengirim OTP...');
      const res = await Auth.requestReset(kode, email);
      UI.setLoading(btn, false);

      // Selalu tampilkan pesan sukses untuk keamanan (tidak bocorkan keberadaan email)
      document.getElementById('reset-step-1').classList.add('hidden');
      document.getElementById('reset-step-2').classList.remove('hidden');
    }

    // ── CONFIRM RESET ──
    async function doConfirmReset() {
      hideError('reset-error-2');
      const kode     = document.getElementById('rs-kode').value.trim();
      const email    = document.getElementById('rs-email').value.trim();
      const otp      = document.getElementById('rs-otp').value.trim();
      const newPass  = document.getElementById('rs-newpass').value;
      const confirm  = document.getElementById('rs-confirm').value;

      if (!otp || !newPass || !confirm) { showError('reset-error-2', 'Semua field wajib diisi.'); return; }
      if (newPass.length < 8) { showError('reset-error-2', 'Sandi baru minimal 8 karakter.'); return; }
      if (newPass !== confirm) { showError('reset-error-2', 'Konfirmasi sandi tidak cocok.'); return; }

      const btn = document.getElementById('confirm-btn');
      UI.setLoading(btn, true, 'Menyimpan...');
      const res = await Auth.confirmReset(kode, email, otp, newPass);
      UI.setLoading(btn, false);

      if (res.success) {
        UI.toast('Sandi berhasil diubah! Silakan login.', 'success');
        setTimeout(() => switchTab('login'), 1500);
      } else {
        showError('reset-error-2', res.message || 'Gagal. Periksa kode OTP Anda.');
      }
    }

    // Enter key submit
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const activeTab = document.querySelector('.step.active')?.id;
      if (activeTab === 'tab-login')    doLogin();
    });
  </script>
</body>
</html>
